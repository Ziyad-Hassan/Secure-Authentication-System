<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap');
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; margin: 0; padding: 40px 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; color: #f8fafc; }
        .dashboard-card { background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); text-align: center; max-width: 600px; width: 100%; border-top: 5px solid #3b82f6; border-left: 1px solid #334155; border-right: 1px solid #334155; border-bottom: 1px solid #334155;}
        .avatar { width: 80px; height: 80px; background: #0f172a; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 36px; color: #60a5fa; font-weight: bold; border: 2px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        h1 { color: #f8fafc; margin: 0 0 10px; font-size: 28px; }
        .badge { display: inline-block; padding: 6px 16px; border-radius: 30px; color: white; font-weight: 600; font-size: 14px; letter-spacing: 0.5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .badge.admin { background: linear-gradient(135deg, #ef4444, #991b1b); }
        .badge.manager { background: linear-gradient(135deg, #f59e0b, #b45309); }
        .badge.user { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        
        .divider { height: 1px; background: #334155; margin: 30px 0; }
        h3 { color: #cbd5e1; margin-bottom: 20px; font-weight: 600; font-size: 18px; }
        
        .links-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .nav-btn { padding: 12px 10px; border-radius: 12px; font-weight: 600; text-decoration: none; color: white; transition: transform 0.2s, box-shadow 0.2s; font-size: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        
        .btn-profile { background: #2563eb; }
        .btn-admin { background: #dc2626; }
        .btn-manager { background: #d97706; }
        .btn-user { background: #475569; }
        
        .logout-btn { display: inline-flex; align-items: center; gap: 8px; background: #0f172a; color: #f87171; border: 1px solid #7f1d1d; padding: 10px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 15px; }
        .logout-btn:hover { background: #7f1d1d; color: #fca5a5; }
    </style>
</head>
<body>
    <div class="dashboard-card">
        <div class="avatar" id="avatarLetter">U</div>
        <h1>Welcome, <span id="name"></span>!</h1>
        <p style="color: #94a3b8; margin-bottom: 5px;">Access Level</p>
        <span id="role" class="badge"></span>
        
        <div class="divider"></div>
        
        <h3>Protected Area Navigation</h3>
        <div class="links-grid">
            <a href="/profile" class="nav-btn btn-profile">My Profile</a>
            <a href="/admin" class="nav-btn btn-admin">Admin Zone</a>
            <a href="/manager" class="nav-btn btn-manager">Manager Zone</a>
            <a href="/user" class="nav-btn btn-user">User Zone</a>
        </div>
        
        <button onclick="logout()" class="logout-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Secure Logout
        </button>
    </div>

    <script>
        const role = localStorage.getItem('uRole');
        const uName = localStorage.getItem('uName') || 'User';
        
        document.getElementById('name').innerText = uName;
        document.getElementById('avatarLetter').innerText = uName.charAt(0).toUpperCase();
        
        const roleSpan = document.getElementById('role');
        roleSpan.innerText = role;
        
        if (role === 'Admin') roleSpan.className = 'badge admin';
        else if (role === 'Manager') roleSpan.className = 'badge manager';
        else roleSpan.className = 'badge user';

        function logout() {
            document.cookie = "token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            localStorage.clear();
            window.location.href = '/login';
        }
    </script>
</body>
</html>
